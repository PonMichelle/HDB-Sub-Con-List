<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HDB Subcontractor Directory — Team</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f4f2ee;--sur:#fff;--sur2:#f9f8f5;--bdr:#e2dfd8;--bdr2:#ccc9c0;--tx:#1a1916;--tx2:#5a5850;--tx3:#9a9488;--blue:#1a56a0;--bblue:#e8f0fb;--lblue:#ddeeff;--green:#1a7a4a;--bgreen:#e6f5ed;--amber:#8a5c00;--bamber:#fef3db;--red:#a02020;--r:6px;--rl:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;flex-direction:column;font-size:13px}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
.app{display:flex;flex:1;overflow:hidden}
.sidebar{width:250px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.sh{padding:14px 16px;border-bottom:1px solid var(--bdr)}
.logo{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.proj{font-size:13px;font-weight:600;color:var(--tx);line-height:1.3}
.syncrow{display:flex;align-items:center;gap:5px;margin-top:5px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.sdot.syn{background:#BA7517}.sdot.err{background:var(--red)}
.stxt{font-size:10.5px;color:var(--tx3)}
.sbcnt{font-size:10.5px;color:var(--tx3);margin-top:3px}
.tsw{padding:8px 12px;border-bottom:1px solid var(--bdr)}
.tsw input{width:100%;padding:5px 9px;font-size:11.5px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--sur2);color:var(--tx);font-family:inherit}
.tsw input:focus{outline:none;border-color:var(--blue)}
.tlist{overflow-y:auto;flex:1}
.ti{padding:7px 14px;cursor:pointer;font-size:12px;color:var(--tx2);display:flex;justify-content:space-between;align-items:center;border-left:2px solid transparent;gap:4px}
.ti:hover{background:var(--sur2);color:var(--tx)}
.ti.act{background:var(--bblue);color:var(--blue);border-left-color:var(--blue);font-weight:500}
.tn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.tc{font-size:10px;background:var(--bg);border-radius:8px;padding:1px 6px;color:var(--tx3);flex-shrink:0}
.ti.act .tc{background:var(--lblue);color:var(--blue)}
.toolbar{padding:10px 16px;border-bottom:1px solid var(--bdr);background:var(--sur);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:180px}
.sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none}
.sw input{width:100%;padding:6px 10px 6px 30px;font-size:12px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--sur2);color:var(--tx);font-family:inherit}
.sw input:focus{outline:none;border-color:var(--blue)}
.tr{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{padding:5px 10px;font-size:12px;border-radius:var(--r);border:1px solid var(--bdr2);background:var(--sur);color:var(--tx2);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;transition:all .1s}
.btn:hover{background:var(--sur2)}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-blue:hover{background:#0d3f82}
.rc{font-size:11px;color:var(--tx3);white-space:nowrap}
.vb{padding:4px 7px;border:1px solid var(--bdr2);background:var(--sur);cursor:pointer;color:var(--tx3);border-radius:var(--r);display:inline-flex;align-items:center}
.vb.act{background:var(--sur2);color:var(--tx)}
.upill{display:flex;align-items:center;gap:4px;padding:4px 9px;background:var(--sur2);border-radius:var(--r);border:1px solid var(--bdr2)}
.upill input{border:none;background:transparent;font-size:11.5px;color:var(--tx);font-family:inherit;width:90px;outline:none}
.fbar{display:flex;gap:6px;align-items:center;padding:7px 16px;background:var(--sur2);border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.fc{padding:3px 10px;border-radius:16px;border:1px solid var(--bdr2);background:var(--sur);color:var(--tx2);cursor:pointer;font-size:11.5px;font-family:inherit}
.fc.act{background:var(--blue);color:#fff;border-color:var(--blue)}
.fc.actg{background:var(--green);color:#fff;border-color:var(--green)}
.pw{display:flex;align-items:center;gap:6px;margin-left:auto}
.pbb{width:90px;height:5px;background:var(--bdr);border-radius:3px;overflow:hidden}
.pbf{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.pt{font-size:11px;color:var(--tx3);white-space:nowrap}
.cards-area{flex:1;overflow-y:auto;padding:14px 16px}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:11px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl);padding:13px 15px;transition:border-color .15s}
.card:hover{border-color:var(--bdr2)}
.card.ic{border-color:#a8d5b5;background:#f6fdf8}
.card.iq{border-color:#e8b84b;border-width:2px;background:#fffbf0}
.card.iq .cname{color:#7a4f00}
.card.ic:not(.iq) .cname{color:var(--green)}
.qrbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:500;background:#fef3db;color:#8a5c00;border:1px solid #e8c96a;white-space:nowrap;flex-shrink:0}
.tr-qr td{background:#fffbf0!important}
.tr-qr td:first-child{color:#7a4f00;font-weight:600}
.fc.acta{background:#8a5c00;color:#fff;border-color:#8a5c00}
.cth{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:6px}
.ctag{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:500;background:var(--bgreen);color:var(--green);border:1px solid #a8d5b5;white-space:nowrap;flex-shrink:0}
.cname{font-size:13.5px;font-weight:600;color:var(--tx);line-height:1.3;margin-bottom:2px}
.cperson{font-size:11.5px;color:var(--tx2);margin-bottom:8px;min-height:16px}
.cdiv{border:none;border-top:1px solid var(--bdr);margin:8px 0}
.cdet{display:flex;flex-direction:column;gap:4px}
.drow{display:flex;align-items:flex-start;gap:6px;font-size:11.5px;color:var(--tx2)}
.drow svg{flex-shrink:0;margin-top:1px;color:var(--tx3)}
.drow span{color:var(--tx);word-break:break-word}
.demail{color:var(--blue)!important;word-break:break-all;font-size:11px}
.rtag{display:inline-block;margin-top:5px;padding:2px 7px;background:var(--bamber);color:var(--amber);font-size:10.5px;border-radius:4px;border:1px solid #f0d890;font-style:italic}
.dpills{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.dpill{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;padding:2px 6px;border-radius:6px}
.dps{background:#e8f0fb;color:var(--blue);border:1px solid #b5d4f4}
.dpq{background:var(--bgreen);color:var(--green);border:1px solid #a8d5b5}
.csec{margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)}
.cbrow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.cbrow input[type=checkbox]{width:14px;height:14px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.cblbl{font-size:11.5px;cursor:pointer;user-select:none;color:var(--tx2)}
.cblbl.done{color:var(--green);font-weight:500}
.bytag{font-size:10px;color:var(--tx3);margin-left:auto;white-space:nowrap}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.df{display:flex;flex-direction:column;gap:2px}
.dlbl{font-size:10px;color:var(--tx3);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.di{padding:4px 7px;font-size:11.5px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--sur2);color:var(--tx);font-family:inherit;width:100%}
.di:focus{outline:none;border-color:var(--blue)}
.ni{width:100%;padding:4px 8px;font-size:11.5px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--sur2);color:var(--tx);font-family:inherit;margin-bottom:6px}
.ni:focus{outline:none;border-color:var(--blue)}
.cfoot{display:flex;gap:5px;margin-top:5px}
.cfoot .btn{padding:3px 8px;font-size:10.5px}
.empty{text-align:center;padding:50px 20px;color:var(--tx3);grid-column:1/-1}
.tw{flex:1;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 12px;text-align:left;font-size:10.5px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;background:var(--sur);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:1;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--bdr);color:var(--tx);vertical-align:middle}
tr:hover td{background:var(--sur2)}
.tde{color:var(--blue);word-break:break-all;font-size:11px}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-ov.open{display:flex}
.modal{background:var(--sur);border-radius:var(--rl);border:1px solid var(--bdr);padding:22px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:15px;font-weight:600;margin-bottom:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11.5px;color:var(--tx2);margin-bottom:4px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;padding:6px 9px;font-size:12px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--sur2);color:var(--tx);font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue)}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid var(--bdr)}
.toast{position:fixed;bottom:18px;right:18px;background:var(--tx);color:#fff;padding:9px 14px;border-radius:var(--r);font-size:12px;z-index:300;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sh">
      <div class="logo">HDB Sub Contractor List</div>
      <div class="proj">Subcontractor Directory</div>
      <div class="syncrow"><div class="sdot" id="sdot"></div><span class="stxt" id="stxt">Loading...</span></div>
      <div class="sbcnt" id="sbcnt"></div>
    </div>
    <div class="tsw"><input type="text" id="tq" placeholder="Filter trades..." oninput="filterTrades()" /></div>
    <div class="tlist" id="tlist"></div>
  </div>
  <div class="main">
    <div class="toolbar">
      <div class="sw">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="mq" placeholder="Search company, contact, phone, email..." oninput="render()" />
      </div>
      <div class="tr">
        <span class="rc" id="rc"></span>
        <button class="vb act" id="vbG" onclick="setView('grid')" title="Cards"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
        <button class="vb" id="vbT" onclick="setView('table')" title="Table"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg></button>
        <div class="upill"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><input type="text" id="uname" placeholder="Your name" /></div>
        <button class="btn" onclick="syncNow()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,4 1,10 7,10"/><polyline points="23,20 23,14 17,14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>Sync</button>
        <button class="btn" onclick="exportCSV()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>CSV</button>
        <button class="btn btn-blue" onclick="openAdd()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add</button>
      </div>
    </div>
    <div class="fbar">
      <button class="fc act" id="fc-all" onclick="setCF('all')">All</button>
      <button class="fc" id="fc-yes" onclick="setCF('yes')">✓ Contacted</button>
      <button class="fc" id="fc-no" onclick="setCF('no')">○ Not contacted</button>
      <button class="fc" id="fc-qr" onclick="setCF('qr')">📥 Quote received</button>
      <div class="pw"><div class="pbb"><div class="pbf" id="pbf" style="width:0%"></div></div><span class="pt" id="pbt">0 / 0 contacted</span></div>
    </div>
    <div class="cards-area" id="ca"><div class="cgrid" id="cg"></div></div>
    <div class="tw" id="ta" style="display:none">
      <table><thead><tr><th>Company</th><th>Trade</th><th>Contact</th><th>Tel/HP</th><th>Email</th><th>Remark</th><th>Contacted</th><th>Quote Received</th><th>Date Sent</th><th>Date Quote</th><th>Notes</th></tr></thead><tbody id="tb"></tbody></table>
    </div>
  </div>
</div>
<div class="modal-ov" id="mo"><div class="modal">
  <h2 id="mt">Add Subcontractor</h2>
  <div class="frow">
    <div class="fg"><label>Company Name *</label><input type="text" id="fco" /></div>
    <div class="fg"><label>Contact Person</label><input type="text" id="fct" /></div>
  </div>
  <div class="fg"><label>Trade *</label><select id="ftr"><option value="">— Select —</option></select></div>
  <div class="frow">
    <div class="fg"><label>Office Tel</label><input type="text" id="ftel" /></div>
    <div class="fg"><label>Mobile / HP</label><input type="text" id="fhp" /></div>
  </div>
  <div class="fg"><label>Email</label><input type="text" id="fem" /></div>
  <div class="fg"><label>Remark</label><textarea id="frm" rows="2"></textarea></div>
  <div class="mfoot">
    <button class="btn" onclick="closeMo()">Cancel</button>
    <button class="btn btn-blue" onclick="saveRec()">Save to Team</button>
  </div>
</div></div>
<div class="toast" id="toast"></div>

  const d=document.getElementById('sdot'),t=document.getElementById('stxt');
  if(s==='ok'){d.className='sdot';t.textContent='Team shared · live';}
  if(s==='syn'){d.className='sdot syn';t.textContent='Syncing...';}
  if(s==='err'){d.className='sdot err';t.textContent='Sync error — offline mode';}
}

async function loadAll(){
  setSS('syn');
  try{
    const[rr,sr]=await Promise.all([
      fetch(`https://storage.claude.ai/api/shared/${SK_R}`).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(`https://storage.claude.ai/api/shared/${SK_S}`).then(r=>r.ok?r.json():null).catch(()=>null)
    ]);
    records=rr?JSON.parse(rr.value):JSON.parse(JSON.stringify(BD));
    statusMap=sr?JSON.parse(sr.value):{};
    nextId=records.length?Math.max(...records.map(r=>r.id))+1:1;
    setSS('ok');
  }catch(e){
    records=JSON.parse(JSON.stringify(BD));
    statusMap={};
    setSS('err');
  }
  renderSB();render();
}

async function saveRecords(){
  setSS('syn');
  try{
    await fetch(`https://storage.claude.ai/api/shared/${SK_R}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:JSON.stringify(records)})});
    setSS('ok');toast('Saved to team ✓');
  }catch(e){setSS('err');toast('Saved locally — sync when online');}
}
async function saveStatus(){
  try{
    await fetch(`https://storage.claude.ai/api/shared/${SK_S}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:JSON.stringify(statusMap)})});
  }catch(e){}
}

function getAllTrades(){const m={};records.forEach(r=>{if(r.trade)m[r.trade]=(m[r.trade]||0)+1;});return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));}
function filterTrades(){tq=document.getElementById('tq').value.toLowerCase();renderSB();}
function renderSB(){
  const all=getAllTrades();const total=records.length;
  document.getElementById('sbcnt').textContent=`${total} subcontractors · ${all.length} trades`;
  const f=all.filter(([t])=>!tq||t.toLowerCase().includes(tq));
  const ac=tq?records.filter(r=>r.trade.toLowerCase().includes(tq)).length:total;
  let h=`<div class="ti${activeTrade==='ALL'?' act':''}" onclick="setTrade('ALL')"><span class="tn">All Trades</span><span class="tc">${ac}</span></div>`;
  f.forEach(([t,c])=>{const e=t.replace(/'/g,"\'").replace(/"/g,'&quot;');h+=`<div class="ti${activeTrade===t?' act':''}" onclick="setTrade('${e}')"><span class="tn">${t}</span><span class="tc">${c}</span></div>`;});
  document.getElementById('tlist').innerHTML=h;
}
function setTrade(t){activeTrade=t;renderSB();render();}
function getFilt(){
  const q=document.getElementById('mq').value.toLowerCase();
  return records.filter(r=>{
    const mt=activeTrade==='ALL'||r.trade===activeTrade;
    const ms=!q||r.company.toLowerCase().includes(q)||(r.contact||'').toLowerCase().includes(q)||(r.tel||'').includes(q)||(r.hp||'').includes(q)||(r.email||'').toLowerCase().includes(q)||r.trade.toLowerCase().includes(q)||(r.remark||'').toLowerCase().includes(q);
    const st=statusMap[r.id]||{};
    const mc=cf==='all'||(cf==='yes'&&st.contacted)||(cf==='no'&&!st.contacted)||(cf==='qr'&&!!st.quoteReceived);
    return mt&&ms&&mc;
  });
}
function upProg(){
  const tot=records.length;
  const contacted=Object.values(statusMap).filter(s=>s.contacted).length;
  const quoted=Object.values(statusMap).filter(s=>s.quoteReceived).length;
  const pct=tot?Math.round(quoted/tot*100):0;
  document.getElementById('pbf').style.width=pct+'%';
  document.getElementById('pbt').textContent=`${contacted} contacted · ${quoted} quoted`;
}
function pIco(){return`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.5 19.79 19.79 0 0 1 1.61 5 2 2 0 0 1 3.6 3h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10.6a16 16 0 0 0 6 6l.9-.9a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 18z"/></svg>`;}
function mIco(){return`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>`;}
function cIco(){return`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;}
function render(){
  upProg();
  const list=getFilt();
  document.getElementById('rc').textContent=`${list.length} result${list.length!==1?'s':''}`;
  if(view==='grid'){
    if(!list.length){document.getElementById('cg').innerHTML=`<div class="empty"><div style="font-size:32px;margin-bottom:10px">🔍</div><div style="font-size:13px;color:var(--tx2)">No subcontractors found</div></div>`;return;}
    document.getElementById('cg').innerHTML=list.map(r=>{
      const st=statusMap[r.id]||{};
      const ic=!!st.contacted;
      const iq=!!st.quoteReceived;
      const ph=r.tel||r.hp;
      const em=(r.email||'').split(/[;,]/).map(e=>e.trim()).filter(Boolean);
      const eH=em.map(e=>`<a href="mailto:${e}" class="demail">${e}</a>`).join('<br>');
      const ds=st.dateSend||'';const dq=st.dateQuote||'';const nt=st.note||'';
      const hasDate=!!dq;
      return`<div class="card${ic?' ic':''}${iq?' iq':''}">
        <div class="cth">
          <div class="ctag">${r.trade}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
            ${iq?`<span class="qrbadge"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Quote rcvd</span>`:''}
            ${ic?`<span class="cbadge"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20,6 9,17 4,12"/></svg>Contacted</span>`:''}
          </div>
        </div>
        <div class="cname">${r.company}</div>
        <div class="cperson">${r.contact||''}</div>
        <hr class="cdiv"/>
        <div class="cdet">
          ${ph?`<div class="drow">${pIco()}<span>${ph}${r.tel&&r.hp&&r.tel!==r.hp?' · '+r.hp:''}</span></div>`:''}
          ${eH?`<div class="drow">${mIco()}<span>${eH}</span></div>`:''}
          ${r.remark?`<div class="rtag">${r.remark}</div>`:''}
          ${(ds||dq)?`<div class="dpills">${ds?`<span class="dpill dps">${cIco()} Sent: ${ds}</span>`:''}${dq?`<span class="dpill dpq">${cIco()} Quote: ${dq}</span>`:''}</div>`:''}
        </div>
        <div class="csec">
          <div class="cbrow">
            <input type="checkbox" id="cb_c${r.id}" ${ic?'checked':''} onchange="toggleContacted(${r.id})" />
            <label class="cblbl${ic?' done':''}" for="cb_c${r.id}" style="${ic?'color:var(--green)':''}">Contacted</label>
            ${ic&&st.by?`<span class="bytag">by ${st.by}</span>`:''}
          </div>
          <div class="cbrow" style="margin-bottom:7px">
            <input type="checkbox" id="cb_q${r.id}" ${iq?'checked':''} onchange="toggleQuote(${r.id})" />
            <label class="cblbl${iq?' done':''}" for="cb_q${r.id}" style="${iq?'color:#8a5c00;font-weight:500':''}">Quote received</label>
            ${iq&&st.qby?`<span class="bytag">by ${st.qby}</span>`:''}
          </div>
          <div class="dgrid">
            <div class="df"><div class="dlbl">📤 Enquiry sent</div><input type="date" class="di" value="${ds}" onchange="uf(${r.id},'dateSend',this.value)" /></div>
            <div class="df"><div class="dlbl">📥 Quote date</div><input type="date" class="di" value="${dq}" style="${hasDate?'border-color:#e8b84b;background:#fffbf0;font-weight:500':''}" onchange="uf(${r.id},'dateQuote',this.value)" /></div>
          </div>
          <input type="text" class="ni" placeholder="Remarks / notes..." value="${nt.replace(/"/g,'&quot;')}" oninput="uf(${r.id},'note',this.value)" />
          <div class="cfoot">
            <button class="btn" onclick="openEdit(${r.id})">Edit</button>
            <button class="btn" style="color:var(--red)" onclick="delRec(${r.id})">Remove</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }else{
    if(!list.length){document.getElementById('tb').innerHTML=`<tr><td colspan="10" style="text-align:center;padding:30px;color:var(--tx3)">No results</td></tr>`;return;}
    document.getElementById('tb').innerHTML=list.map(r=>{
      const st=statusMap[r.id]||{};
      const ic=!!st.contacted;
      const iq=!!st.quoteReceived;
      const em=(r.email||'').split(/[;,]/).map(e=>e.trim()).filter(Boolean).map(e=>`<a href="mailto:${e}" class="tde">${e}</a>`).join('<br>');
      const ph=[r.tel,r.hp].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i).join(' / ');
      const rowBg=iq?'background:#fffbf0':ic?'background:#f6fdf8':'';
      const namColor=iq?'color:#7a4f00;font-weight:600':ic?'color:var(--green);font-weight:500':'font-weight:500';
      return`<tr style="${rowBg}">
        <td style="${namColor}">${r.company}${iq?` <span style="font-size:10px;background:#fef3db;color:#8a5c00;border:1px solid #e8c96a;border-radius:6px;padding:1px 6px;vertical-align:middle;font-weight:400">📥 Quote</span>`:''}</td>
        <td style="font-size:11px;color:var(--tx2)">${r.trade}</td>
        <td>${r.contact||'—'}</td>
        <td style="white-space:nowrap;font-size:11px">${ph||'—'}</td>
        <td>${em||'—'}</td>
        <td style="font-size:10.5px;color:var(--tx3);font-style:italic">${r.remark||''}</td>
        <td style="text-align:center">
          <input type="checkbox" ${ic?'checked':''} onchange="toggleContacted(${r.id})" style="accent-color:var(--green)" />
          ${ic&&st.by?`<div style="font-size:9.5px;color:var(--tx3)">${st.by}</div>`:''}
        </td>
        <td style="text-align:center">
          <input type="checkbox" ${iq?'checked':''} onchange="toggleQuote(${r.id})" style="accent-color:#e8b84b" />
          ${iq&&st.qby?`<div style="font-size:9.5px;color:var(--tx3)">${st.qby}</div>`:''}
        </td>
        <td><input type="date" class="di" style="width:120px" value="${st.dateSend||''}" onchange="uf(${r.id},'dateSend',this.value)" /></td>
        <td><input type="date" class="di" style="width:120px${!!st.dateQuote?';border-color:#e8b84b;background:#fff8e6;font-weight:500':''}" value="${st.dateQuote||''}" onchange="uf(${r.id},'dateQuote',this.value)" /></td>
        <td><input type="text" class="ni" style="width:140px;margin:0" placeholder="Notes..." value="${(st.note||'').replace(/"/g,'&quot;')}" oninput="uf(${r.id},'note',this.value)" /></td>
      </tr>`;
    }).join('');
  }
}
function setView(v){
  view=v;
  document.getElementById('ca').style.display=v==='grid'?'':'none';
  document.getElementById('ta').style.display=v==='table'?'':'none';
  document.getElementById('vbG').classList.toggle('act',v==='grid');
  document.getElementById('vbT').classList.toggle('act',v==='table');
  render();
}
function setCF(f){
  cf=f;['all','yes','no','qr'].forEach(k=>{const el=document.getElementById('fc-'+k);if(el)el.classList.remove('act','actg','acta');});
  const cls=f==='yes'?'actg':f==='qr'?'acta':'act';
  document.getElementById('fc-'+f).classList.add(cls);
  render();
}
async function toggleContacted(id){
  const st=statusMap[id]||{};const nv=!st.contacted;
  const u=document.getElementById('uname').value.trim()||'Team';
  statusMap[id]={...st,contacted:nv,by:nv?u:''};
  render();await saveStatus();
}
async function toggleQuote(id){
  const st=statusMap[id]||{};const nv=!st.quoteReceived;
  const u=document.getElementById('uname').value.trim()||'Team';
  statusMap[id]={...st,quoteReceived:nv,qby:nv?u:''};
  render();await saveStatus();
}
async function uf(id,field,val){
  const st=statusMap[id]||{};
  statusMap[id]={...st,[field]:val};
  clearTimeout(nTimers[id]);
  nTimers[id]=setTimeout(async()=>{await saveStatus();},600);
}
function getUser(){return document.getElementById('uname').value.trim()||'Team';}
function popTr(){
  const tr=getAllTrades().map(([t])=>t);
  const sel=document.getElementById('ftr');
  sel.innerHTML='<option value="">— Select trade —</option>';
  tr.forEach(t=>{const o=document.createElement('option');o.value=o.textContent=t;sel.appendChild(o);});
  const c=document.createElement('option');c.value='__custom__';c.textContent='+ Add new trade...';sel.appendChild(c);
}
function openAdd(){
  eid=null;document.getElementById('mt').textContent='Add Subcontractor';
  ['fco','fct','ftel','fhp','fem','frm'].forEach(id=>document.getElementById(id).value='');
  popTr();if(activeTrade!=='ALL')document.getElementById('ftr').value=activeTrade;
  document.getElementById('mo').classList.add('open');
}
function openEdit(id){
  const r=records.find(x=>x.id===id);if(!r)return;
  eid=id;document.getElementById('mt').textContent='Edit Subcontractor';
  popTr();
  document.getElementById('fco').value=r.company||'';
  document.getElementById('fct').value=r.contact||'';
  document.getElementById('ftr').value=r.trade||'';
  document.getElementById('ftel').value=r.tel||'';
  document.getElementById('fhp').value=r.hp||'';
  document.getElementById('fem').value=r.email||'';
  document.getElementById('frm').value=r.remark||'';
  document.getElementById('mo').classList.add('open');
}
async function saveRec(){
  let tr=document.getElementById('ftr').value;
  if(tr==='__custom__'){tr=prompt('New trade name:');if(!tr)return;}
  const co=document.getElementById('fco').value.trim();
  if(!co||!tr){alert('Company and trade required.');return;}
  const d={company:co,trade:tr,contact:document.getElementById('fct').value.trim(),
    tel:document.getElementById('ftel').value.trim(),hp:document.getElementById('fhp').value.trim(),
    phone:document.getElementById('ftel').value.trim()||document.getElementById('fhp').value.trim(),
    email:document.getElementById('fem').value.trim(),remark:document.getElementById('frm').value.trim()};
  if(eid){const i=records.findIndex(x=>x.id===eid);records[i]={...records[i],...d};}
  else{records.push({id:nextId++,...d,addedBy:getUser(),addedAt:new Date().toISOString()});}
  closeMo();renderSB();render();await saveRecords();
}
async function delRec(id){
  const r=records.find(x=>x.id===id);if(!r)return;
  if(!confirm(`Remove "${r.company}"? This affects the whole team.`))return;
  records=records.filter(x=>x.id!==id);delete statusMap[id];
  renderSB();render();
  await Promise.all([saveRecords(),saveStatus()]);
}
function closeMo(){document.getElementById('mo').classList.remove('open');}
document.getElementById('mo').addEventListener('click',e=>{if(e.target===e.currentTarget)closeMo();});
async function syncNow(){setSS('syn');await loadAll();toast('Synced with team ✓');}
setInterval(async()=>{
  try{
    const[rr,sr]=await Promise.all([
      fetch(`https://storage.claude.ai/api/shared/${SK_R}`).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(`https://storage.claude.ai/api/shared/${SK_S}`).then(r=>r.ok?r.json():null).catch(()=>null)
    ]);
    let ch=false;
    if(rr){const f=JSON.parse(rr.value);if(JSON.stringify(f)!==JSON.stringify(records)){records=f;ch=true;}}
    if(sr){const f=JSON.parse(sr.value);if(JSON.stringify(f)!==JSON.stringify(statusMap)){statusMap=f;ch=true;}}
    if(ch){renderSB();render();}
  }catch(e){}
},15000);
function exportCSV(){
  const list=getFilt();
  const h=['Company','Trade','Contact','Tel','HP','Email','Remark','Contacted','By','Quote Received','By','Date Sent','Date Quote Recv','Notes'];
  const rows=list.map(r=>{const st=statusMap[r.id]||{};
    return[r.company,r.trade,r.contact,r.tel,r.hp,r.email,r.remark,
      st.contacted?'Yes':'No',st.by||'',
      st.quoteReceived?'Yes':'No',st.qby||'',
      st.dateSend||'',st.dateQuote||'',st.note||'']
      .map(v=>`"${(v||'').replace(/"/g,'""')}"`);});
  const csv=[h.join(','),...rows.map(r=>r.join(','))].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='HDB_Subcontractors.csv';a.click();
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
try{const n=localStorage.getItem('hdb_uname');if(n)document.getElementById('uname').value=n;}catch(e){}
document.getElementById('uname').addEventListener('input',function(){try{localStorage.setItem('hdb_uname',this.value);}catch(e){}});
loadAll();
</script>
</body>
</html>
